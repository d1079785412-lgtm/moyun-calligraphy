    const storageKey = "caoquan-lishu-review-corrections-v1";
    let corrections = JSON.parse(localStorage.getItem(storageKey) || "{}");
    let page = 0;
    const counts = rows.reduce((map, row) => { if (row.char) map[row.char] = (map[row.char] || 0) + 1; return map; }, {});
    const $ = (id) => document.getElementById(id);
    const q = $("q");
    const mode = $("mode");
    const pageSize = $("pageSize");
    const grid = $("grid");
    const stats = $("stats");
    const out = $("out");
    function escapeHtml(value) { return String(value ?? "").replace(/[&<>"]/g, (ch) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;" }[ch])); }
    function save() { localStorage.setItem(storageKey, JSON.stringify(corrections)); }
    function effectiveChar(row) { return corrections[row.id]?.char ?? row.char; }
    function isChanged(row) { return corrections[row.id]?.char !== undefined && corrections[row.id].char !== row.char; }
    function filtered() {
      const term = q.value.trim();
      const m = mode.value;
      return rows.filter((row) => {
        const fixed = effectiveChar(row);
        if (m === "changed" && !isChanged(row)) return false;
        if (m === "blank" && row.char) return false;
        if (m === "dup" && !(row.char && counts[row.char] > 1)) return false;
        if (!term) return true;
        return row.id.includes(term) || String(row.page) === term || row.source.includes(term) || row.char.includes(term) || row.text.includes(term) || fixed.includes(term);
      });
    }
    function render() {
      const list = filtered();
      const size = Number(pageSize.value);
      const pages = Math.max(1, Math.ceil(list.length / size));
      page = Math.min(page, pages - 1);
      const slice = list.slice(page * size, page * size + size);
      const changedCount = rows.filter(isChanged).length;
      const blankCount = rows.filter((row) => !row.char).length;
      stats.textContent = `共 ${rows.length} 格，当前 ${list.length} 格，第 ${page + 1}/${pages} 页，已修改 ${changedCount} 格，未识别 ${blankCount} 格`;
      grid.innerHTML = slice.map((row) => {
        const fixed = effectiveChar(row);
        const changed = isChanged(row);
        const blank = !row.char;
        const duplicate = row.char && counts[row.char] > 1;
        return `
          <article class="card ${changed ? "changed" : blank ? "bad" : ""}">
            <div class="glyph"><img src="${escapeHtml(row.glyphUrl)}" loading="lazy" alt="${escapeHtml(row.id)}" /></div>
            <div class="ocr"><strong>${escapeHtml(row.char || "□")}</strong><span class="score">${blank ? "未识别" : duplicate ? "重复 " + counts[row.char] : "已识别"}</span></div>
            <div class="fix"><input data-id="${escapeHtml(row.id)}" value="${escapeHtml(fixed)}" maxlength="3" inputmode="text" /><button type="button" class="secondary mark" data-id="${escapeHtml(row.id)}" data-clear="1">清</button></div>
            <div class="meta">${escapeHtml(row.id)}<br />${escapeHtml(row.source)} 第 ${escapeHtml(row.page)} 页 / 第 ${escapeHtml(row.col)} 列 / 第 ${escapeHtml(row.row)} 行<br />原释文: ${escapeHtml(row.text || "空")}</div>
          </article>`;
      }).join("");
    }
    function csvText() {
      const lines = ["glyph_id,char"];
      for (const row of rows) { if (isChanged(row)) lines.push(`${row.id},${corrections[row.id].char}`); }
      return lines.join("\n") + "\n";
    }
    function exportCsv() {
      out.value = csvText();
      const blob = new Blob([out.value], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "caoquan-lishu-corrections.csv";
      a.click();
      URL.revokeObjectURL(url);
    }
    async function copyCsv() {
      out.value = csvText();
      try { await navigator.clipboard.writeText(out.value); stats.textContent = stats.textContent + "，CSV 已复制"; }
      catch { out.focus(); out.select(); }
    }
    grid.addEventListener("input", (event) => {
      if (!event.target.matches("input[data-id]")) return;
      const id = event.target.dataset.id;
      corrections[id] = { char: event.target.value.trim() };
      save();
      event.target.closest(".card")?.classList.add("changed");
      const changedCount = rows.filter(isChanged).length;
      stats.textContent = stats.textContent.replace(/已修改 \d+ 格/, `已修改 ${changedCount} 格`);
    });
    grid.addEventListener("change", (event) => { if (event.target.matches("input[data-id]")) render(); });
    grid.addEventListener("click", (event) => { const button = event.target.closest("button[data-clear]"); if (!button) return; delete corrections[button.dataset.id]; save(); render(); });
    $("prev").onclick = () => { page = Math.max(0, page - 1); render(); };
    $("next").onclick = () => { page += 1; render(); };
    q.oninput = () => { page = 0; render(); };
    mode.onchange = () => { page = 0; render(); };
    pageSize.onchange = () => { page = 0; render(); };
    $("clear").onclick = () => { if (confirm("确定清空本地修改？")) { corrections = {}; save(); render(); } };
    $("exportCsv").onclick = exportCsv; $("exportCsv2").onclick = exportCsv; $("copyCsv").onclick = copyCsv; $("copyCsv2").onclick = copyCsv;
    render();
  </script>
