    const storageKey = "caoquan-lishu-review-corrections-v2";

        if (!term) return true;
        const label = effectiveLabel(row);

      return { slice: list.slice(page * size, page * size + size), pages, size };
    }

      corrections[event.target.dataset.id] = { char: event.target.value.trim() };
      save();
    });
    grid.addEventListener('change', (event) => { if (event.target.matches('input[data-id]')) render(); });
    grid.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-clear]');
      if (!button) return;
      delete corrections[button.dataset.id];
      save();
      render();
    });
    q.oninput = () => { page = 0; render(); };
    mode.onchange = () => { page = 0; render(); };
    pageSize.onchange = () => { page = 0; render(); };
    $('prev').onclick = () => { page = Math.max(0, page - 1); render(); };
    $('next').onclick = () => { page += 1; render(); };
    $('clear').onclick = () => { if (confirm('确定清空当前浏览器里的修改？')) { corrections = {}; save(); render(); } };
    $('exportCsv').onclick = () => {
      const lines = ['glyph_id,char'];
      for (const row of rows) {
        if (changedLocally(row)) lines.push(`${row.id},${corrections[row.id].char}`);
      }
      out.value = lines.join('\n');
      const blob = new Blob([out.value + '\n'], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'caoquan-lishu-corrections.csv';
      a.click();
      URL.revokeObjectURL(url);
    };
    render();
  </script>
</body>
</html>
