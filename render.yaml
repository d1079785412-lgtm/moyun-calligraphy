services:
  - type: web
    name: moyun-calligraphy
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start -- --hostname 0.0.0.0 --port $PORT
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: TEXT_MODEL_PROVIDER
        value: deepseek
      - key: TEXT_MODEL_BASE_URL
        value: https://api.deepseek.com
      - key: TEXT_MODEL_NAME
        value: deepseek-chat
      - key: POEM_MODEL_NAME
        value: deepseek-v4-pro
      - key: IMAGE_MODEL_PROVIDER
        value: qwen
      - key: IMAGE_MODEL_BASE_URL
        value: https://dashscope.aliyuncs.com/api/v1
      - key: IMAGE_MODEL_NAME
        value: qwen-image-plus
